name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install CMake and RPM
      run: sudo apt update && sudo apt install cmake rpm
    
    - name: Configure and build
      run: |
        cmake -H. -B_build
        cmake --build _build
    
    - name: Create packages
      run: |
        cd _build
        cpack -G DEB
        cpack -G RPM
        cpack -G TGZ
        cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
